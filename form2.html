<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: rgb(135, 135, 167);">
    <table>
        <tr>
            <td>FIRST NAME</td>
            <td><input type="text" maxlength="30" required></td>
        </tr>
        <tr>
            <td>LAST NAME</td>
             <td><input type="text" maxlength="30" required></td>
        </tr>
            <tr>
                <td>DATE OF BIRTH</td>
                   <td>
                      <input type="date" name="DD/MM/YYYY">
                    </td>
            </tr>
            <tr>
                 <td>EMAIL ID</td>
                 <td><input type="Email"></td>
            </tr>    
            <tr>
                <td>MOBILE NUMBER</td>
                <td><input type="tel" maxlength="10" required></td>
            </tr>
            <tr>
                 <td>GENDER</td>
                    <td>
                       <label for="male">Male</label>
                       <input type="radio" Checked name="gender" id="Male">
                       <label for="female">Female</label>
                       <input type="radio" name="gender" id="female">
                    </td>  
            </tr>
            <tr>
                <td>ADDRESS</td>
                <td><textarea name="" placeholder="Address" id="" cols="30" rows="10"></textarea></td>
            </tr>
            <tr>
                <td>CITY</td>
                <td><input type="text" max="30" required></td>

            </tr>
            <tr>
                <td>PIN CODE</td>
                <td><input type="text" maxlength="6" required></td>
            </tr>
            <tr>
               <td>STATE</td>
               <td><input type="text" maxlength="30" required></td>
            </tr>
            <tr>
                <td>COUNTRY</td>
                <td>
                    <select>
                        <option value="" disabled select>--select your country--</option>
                        <option value="" india">India</option>
                        <option value="pakisthan">Pakisthan</option>
                        <option value="China">China</option>
                    </select>
                </td>
                <tr>
                    <td>HOBBIES</td>  
                   <td>
                        <label for="Drawing">Drawing</label>
                        <input type="Checkbox" name="" id="Drawing">
                        <label for="singing">Singing</label>
                        <input type="Checkbox" Checked name="" id="Singing">
                        <label for="sslc">Sketching</label>
                        <input type="Checkbox" name="" id="Sketching">
                        <label for="Dancing">Dancing</label>
                        <input type="Checkbox" Checked name="" id="Dancing">
                        <br>
                        <label for="Dancing">Others</label>
                        <input type="Checkbox" Checked name="" id="Others">
                        <br>
                        <input type="text">
                    </td>           
                </tr>
                <tr>
                    <td>QUALIFICATIONS</td>
                    <td>
                        <table>
                            <tr> 
                                <th>Sl.No</th>
                                <th>Examination</th>
                                <th>Board</th>
                                <th>Percentage</th>
                                <th>Year Of Passing</th>
                            </tr>
                            <tr>
                                <td>1</td>
                                <td>class X</td>
                                <td><input type="text"maxlength="10" required></td>
                                <td><input type="text"maxlength="6"></td>
                                <td><input type="text"></td>
                            </tr>
                            <tr>
                                <td>2</td>
                                <td>class XII</td>
                                <td><input type="text"maxlength="10" required></td>
                                <td><input type="text"maxlength="6"></td>
                                <td><input type="text"></td>
                            </tr>
                            <tr>
                                <td>3</td>
                                <td>Graduation</td>
                                <td><input type="text"maxlength="10" required></td>
                                <td><input type="text"maxlength="6"></td>
                                <td><input type="text"></td>
                                
                            </tr>
                            <tr>
                                <td>4</td>
                                <td>Masters</td>
                                <td><input type="text" maxlength="10" required></td>
                                <td><input type="text"maxlength="6"></td>
                                <td><input type="text"></td>
                            </tr>
                    </td>
                </tr>
                     </table>
                <tr>
                    <td>COURSES APPLIED FOR</td>
                    <td>
                       <label for="BCA">BCA</label>
                    <input type="radio" Checked name="Courses" id="BCA">
                    <label for="B.com">B.Com</label>
                    <input type="radio" name="Courses" id="B.com">
                    <label for="B.com">B.A</label>
                    <input type="radio" name="Courses" id="B.A">
                    </td>
                </tr>
                <tr>
                    <td><input type="submit" value="submit"></td>
                    <td><input type="Reset" value="reset"></td>

                </tr>
            </tr>
    </table>
</body>
</html>
