<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Forms</title>
</head>

<body>
    <form action=""></form>
    <table>
        <tr>
            <td>FIRST NAME</td>
            <td><input type="text" maxlength="30" required> (max 30 character a-z and A-Z)</td>
        </tr>
        <tr>
            <td>LAST NAME</td>
            <td><input type="text" maxlength="30" required></td>
        </tr>
        <tr>
            <td> DATE OF BIRTH </td>
            <td>
                <input type="date" name="DD/MM/YYYY">
            </td>
        </tr>
        <tr>
            <td> EMAIL ID</td>
            <td><input type="email" name="EMAIL ID"></td>
        </tr>
        <tr>
            <td>PHONE NUMBER</td>
            <td><input type="tel" maxlength="10" required></td>
        </tr>
        <tr>
            <td>
                <p>GENDER</p>
                <label for="MALE">MALE</label>
                <input type="radio" Checked name="GENDER" id="MALE">
                <label for="FEMALE">FEMALE</label>
                <input type="radio" name="GENDER" id="FEMALE">
            </td>
        </tr>
        <tr>
            <td> ADDRESS</td>
            <td><textarea name="" placeholder="ADDRESS" id="" cols="30" rows="10"></textarea></td>
        </tr>
        <tr>
            <td> CITY </td>
            <td><input type="text"></td>
        </tr>
        <tr>
            <td> PIN CODE</td>
            <td><input type="text" name="PIN CODE"></td>
        </tr>
        <td> STATE</td>
        <td><input type="text" name="STATE"></td>
        </tr>
        <tr>
            <td>COUNTRY</td>
            <td><input type="text" name="COUNTRY"></td>
        </tr>
        <tr>
            <td> HOBBIES </td>
            <td>
                <label for="Drawing">Drawing</label>
                <input type="Checkbox" name="" id="Drawing">
                <label for="singing">Singing</label>
                <input type="Checkbox" name="" id="Singing">
                <label for="sslc">Sketching</label>
                <input type="Checkbox" name="" id="Sketching">
                <label for="Dancing">Dancing</label>
                <input type="Checkbox" name="" id="Dancing">
                <br>
                <label for="Dancing">Others</label>
                <input type="Checkbox" name="" id="Others">
                <input type="text">
            </td>
        </tr>
        <tr>
            <td>QUALIFICATIONS</td>
            <td>
                <table>
                    <tr>
                        <th>Sl.No</th>
                        <th>Examination</th>
                        <th>Board</th>
                        <th>Percentage</th>
                        <th>Year Of Passing</th>
                    </tr>
                    <tr>
                        <td>1</td>
                        <td>class X</td>
                        <td><input type="text" maxlength="10" required></td>
                        <td><input type="text" maxlength="6"></td>
                        <td><input type="text"></td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>class XII</td>
                        <td><input type="text" maxlength="10" required></td>
                        <td><input type="text" maxlength="6"></td>
                        <td><input type="text"></td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Graduation</td>
                        <td><input type="text" maxlength="10" required></td>
                        <td><input type="text" maxlength="6"></td>
                        <td><input type="text"></td>

                    </tr>
                    <tr>
                        <td>4</td>
                        <td>Masters</td>
                        <td><input type="text" maxlength="10" required></td>
                        <td><input type="text" maxlength="6"></td>
                        <td><input type="text"></td>
                    </tr>
            </td>
        </tr>
    </table>
    <tr>
        <td>COURSES APPLIED FOR</td>
        <td>
            <label for="BCA">BCA</label>
            <input type="radio" Checked name="Courses" id="BCA">
            <label for="B.com">B.Com</label>
            <input type="radio" name="Courses" id="B.com">
            <label for="B.com">B.A</label>
            <input type="radio" name="Courses" id="B.A">
        </td>
    </tr>
    <tr>
        <td><input type="submit" value="submit"></td>
        <td><input type="Reset" value="reset"></td>

    </tr>

    </tr>


    </table>


</body>

</html>
